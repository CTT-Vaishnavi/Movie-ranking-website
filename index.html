<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Listing Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header>
        <h1>🎬 Movie Rating Website</h1>

        <input type="text" id="search" placeholder="Search movie...">
    </header>


    <section class="movie-container" id="movieContainer">

        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w500/qNBAXBIQlnOThrVvA6mA2B5ggV6.jpg">

            <h2>Avengers Endgame</h2>
            <p>Genre: Action</p>
            <p>Year: 2019</p>

            <div class="rating" data-id="0">
                <i class="fa fa-star" data-value="1"></i>
                <i class="fa fa-star" data-value="2"></i>
                <i class="fa fa-star" data-value="3"></i>
                <i class="fa fa-star" data-value="4"></i>
                <i class="fa fa-star" data-value="5"></i>
            </div>

            <p class="avg">Rating: <span>0</span></p>

        </div>
       
        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w500/t6HIqrRAclMCA60NsSmeqe9RmNV.jpg">

            <h2>Spider Man</h2>
            <p>Genre: Action</p>
            <p>Year: 2021</p>

            <div class="rating" data-id="1">
                <i class="fa fa-star" data-value="1"></i>
                <i class="fa fa-star" data-value="2"></i>
                <i class="fa fa-star" data-value="3"></i>
                <i class="fa fa-star" data-value="4"></i>
                <i class="fa fa-star" data-value="5"></i>
            </div>

            <p class="avg">Rating: <span>0</span></p>

        </div>


        <div class="movie-card">
            <img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg">

            <h2>Wonder Woman</h2>
            <p>Genre: Adventure</p>
            <p>Year: 2020</p>

            <div class="rating" data-id="2">
                <i class="fa fa-star" data-value="1"></i>
                <i class="fa fa-star" data-value="2"></i>
                <i class="fa fa-star" data-value="3"></i>
                <i class="fa fa-star" data-value="4"></i>
                <i class="fa fa-star" data-value="5"></i>
            </div>

            <p class="avg">Rating: <span>0</span></p>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
