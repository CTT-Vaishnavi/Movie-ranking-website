
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieRate</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Modal -->
    <div id="loginModal" class="modal login-modal" style="display: flex;">
        <div class="modal-content login-content">
            <h2>Login to Continue</h2>
            <p>Login required for favorites and theme features</p>
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button onclick="login()">Login</button>
            <p style="margin-top: 10px; font-size: 12px;">Demo: Vaishu / 2004</p>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo">🎬 MovieRate</div>
        <ul class="nav-links">
            <li><a href="#filter-buttons">Movies</a></li>
            <li><a href="#filter-buttons">About</a></li>
            <li><a href="#filter-buttons">Contact</a></li>
        </ul>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Movies">
        </div>
        <div id="authSection" style="display: none;">
            <span id="userWelcome" class="user-welcome"></span>
            <button id="themeToggle" class="theme-toggle">
                <i class="fas fa-moon"></i>
            </button>
            <button id="logoutBtn" class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Discover Amazing Movies</h1>
            <p>Explore trending movies and rate your favorites</p>
            <button class="hero-btn" onclick="filterMovies('all')">Explore Now</button>
        </div>
    </section>

    <!-- Filter Buttons -->
    <div class="filter-buttons" id="filter-buttons">
        <button onclick="filterMovies('all')" class="active">All</button>
        <button onclick="filterMovies('Action')">Action</button>
        <button onclick="filterMovies('Drama')">Drama</button>
        <button onclick="filterMovies('Comedy')">Comedy</button>
        <button onclick="filterMovies('Sci-Fi')">Sci-Fi</button>
        <button onclick="filterMovies('Animation')">Animation</button>
        <button onclick="filterMovies('Historical')">Historical</button>
        <button onclick="filterMovies('Fantasy')">Fantasy</button>
        <button onclick="filterMovies('Thriller')">Thriller</button>
    </div>

    <!-- Favorites Section -->
    <section id="favoritesSection" class="favorites-section" style="display: none;">
        <h2>Your Favorites <span id="favoritesCount">(0)</span></h2>
        <div id="favoritesContainer" class="movie-container"></div>
    </section>

    <!-- Movies Container -->
    <section class="movie-container" id="movieContainer"></section>

    <!-- Trailer Modal -->
    <div id="trailerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeTrailer()">&times;</span>
            <iframe id="trailerFrame" width="100%" height="400" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>




    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 MovieRate. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </div>
            <div class="social-icons">
                <a href="https://www.facebook.com/"><i class="fab fa-facebook"></i></a>
                <a href="https://twitter.com/yourusername"><i class="fab fa-twitter"></i></a>
                <a href="https://www.instagram.com/_its_vaishu.s_0064/#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
