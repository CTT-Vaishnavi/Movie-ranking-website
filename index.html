<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieRate</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

    <nav class="navbar">
        <div class="logo">🎬 MovieRate</div>

        <ul class="nav-links">
            <li><a href="#filter-buttons">Movies</a></li>
        </ul>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Movies">
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Discover Amazing Movies</h1>
            <p>Explore trending movies and rate your favorites</p>
            <button class="hero-btn" onclick="filterMovies('all')">Explore Now</button>
        </div>
    </section>

    <!-- 🔥 FILTER BUTTONS -->
    <div class="filter-buttons" id="filter-buttons">
        <button onclick="filterMovies('all')" class="active">All</button>
        <button onclick="filterMovies('Action')">Action</button>
        <button onclick="filterMovies('Drama')">Drama</button>
        <button onclick="filterMovies('Comedy')">Comedy</button>
        <button onclick="filterMovies('Sci-Fi')">Sci-Fi</button>
        <button onclick="filterMovies('Animation')">Animation</button>
        <button onclick="filterMovies('Historical')">Historical</button>
        <button onclick="filterMovies('Fantasy')">Fantasy</button>
        <button onclick="filterMovies('Thriller')">Thriller</button>
    </div>

    <!-- MOVIES -->
    <section class="movie-container" id="movieContainer"></section>

    <div id="trailerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeTrailer()">&times;</span>
            <iframe id="trailerFrame" width="100%" height="400" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
